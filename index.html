<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>个人电竞测算分析 - 法务页</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f4f4ef;
        --paper: rgba(255, 255, 255, 0.96);
        --ink: #17222b;
        --muted: #61707b;
        --line: rgba(23, 34, 43, 0.08);
        --accent: #214556;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background:
          radial-gradient(circle at top right, rgba(33, 69, 86, 0.08), transparent 26%),
          linear-gradient(180deg, #f7f5ee 0%, var(--bg) 100%);
        color: var(--ink);
        font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif;
        line-height: 1.7;
      }

      main {
        width: min(920px, calc(100% - 32px));
        margin: 0 auto;
        padding: 48px 0 72px;
      }

      .hero,
      .card {
        background: var(--paper);
        border: 1px solid var(--line);
        border-radius: 28px;
        box-shadow: 0 16px 36px rgba(20, 28, 36, 0.06);
      }

      .hero {
        padding: 32px;
        margin-bottom: 20px;
      }

      .eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 6px 12px;
        border-radius: 999px;
        background: rgba(33, 69, 86, 0.08);
        color: var(--accent);
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      h1 {
        margin: 18px 0 12px;
        font-size: clamp(28px, 4vw, 40px);
        line-height: 1.18;
      }

      .summary {
        max-width: 720px;
        color: var(--muted);
        font-size: 16px;
      }

      .card {
        padding: 28px 32px;
      }

      .grid {
        display: grid;
        gap: 16px;
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      }

      .item {
        display: block;
        text-decoration: none;
        color: inherit;
        padding: 22px 24px;
        border-radius: 22px;
        border: 1px solid var(--line);
        background: rgba(33, 69, 86, 0.04);
      }

      .item strong {
        display: block;
        font-size: 18px;
        margin-bottom: 8px;
      }

      .item span,
      .meta {
        color: var(--muted);
        font-size: 15px;
      }

      .meta {
        margin-top: 18px;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="hero">
        <div class="eyebrow">个人电竞测算分析</div>
        <h1>法务与政策页面</h1>
        <p class="summary">
          这里提供“个人电竞测算分析”当前版本的隐私政策与服务条款，用于 App 内跳转、App Store 审核与用户查阅。
        </p>
        <p class="meta">联系邮箱：yanzudeemail@163.com</p>
      </section>

      <section class="card">
        <div class="grid">
          <a class="item" href="./privacy.html">
            <strong>隐私政策</strong>
            <span>说明账号登录、投资测算、云同步、买断校验与客户支持中涉及的信息处理方式。</span>
          </a>
          <a class="item" href="./terms.html">
            <strong>服务条款</strong>
            <span>说明账号使用、投资测算结果、导出能力、买断权益与责任边界等规则。</span>
          </a>
        </div>
      </section>
    </main>
  </body>
</html>
